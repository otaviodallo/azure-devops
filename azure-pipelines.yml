# Pipeline mínima: instalar dependências, rodar testes e publicar cobertura (Cobertura).
# Crie a variável de pipeline ou use o pool default da sua org.

trigger:
  - main
  - master

pool:
  vmImage: "ubuntu-latest"

variables:
  nodeVersion: "20.x"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: $(nodeVersion)
    displayName: "Instalar Node.js"

  - script: |
      npm ci
    displayName: "npm ci"

  - script: |
      npm run test:coverage
    displayName: "Testes (Jest + cobertura)"

  - task: PublishCodeCoverageResults@2
    inputs:
      codeCoverageTool: "Cobertura"
      summaryFileLocation: "$(System.DefaultWorkingDirectory)/coverage/cobertura-coverage.xml"
    displayName: "Publicar cobertura"
    condition: succeededOrFailed()
